[theme]
primaryColor = "#FF9900"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1E26"
textColor = "#FAFAFA"
font = "sans serif"

[server]
maxUploadSize = 10
enableXsrfProtection = true
enableCORS = false
enableXsrfCookie = false

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false

[global]
developmentMode = false